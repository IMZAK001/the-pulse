<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="The Pulse">
<meta name="description" content="News through the lens of culture. Fast. Real. Yours.">
<title>The Pulse</title>
<link rel="manifest" href="manifest.json">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@700;800;900&family=DM+Sans:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* ============================================================
   THE PULSE — PRODUCTION STYLESHEET
   ============================================================ */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; overflow: hidden; }

:root {
  --black: #000;
  --near-black: #080808;
  --surface: #111;
  --border: #1e1e1e;
  --white: #fff;
  --off-white: #f0ede8;
  --muted: rgba(255,255,255,0.4);

  /* Category colors */
  --geo: #ff3b5c;
  --money: #00e676;
  --tech: #4f8cff;
  --culture: #c850ff;

  /* UI */
  --radius: 20px;
  --transition: 0.38s cubic-bezier(.22,.68,0,1.1);
}

body {
  background: var(--black);
  font-family: 'DM Sans', sans-serif;
  color: var(--white);
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  overflow: hidden;
}

/* ============================================================
   PHONE SHELL
   ============================================================ */
.phone {
  width: 393px;
  height: 852px;
  background: var(--black);
  border-radius: 50px;
  border: 1.5px solid #1a1a1a;
  overflow: hidden;
  position: relative;
  display: flex;
  flex-direction: column;
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.04),
    0 80px 160px rgba(0,0,0,0.95),
    inset 0 1px 0 rgba(255,255,255,0.06);
}

/* Dynamic island */
.island {
  position: absolute;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 120px;
  height: 34px;
  background: #000;
  border-radius: 20px;
  z-index: 1000;
  border: 1px solid #1a1a1a;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  overflow: hidden;
}

.island-dot { width: 10px; height: 10px; border-radius: 50%; background: #1a1a1a; }
.island-cam { width: 10px; height: 10px; border-radius: 50%; background: #1c1c1e; border: 2px solid #2c2c2e; }

/* Status bar */
.statusbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 54px 28px 0;
  font-size: 12px;
  font-weight: 700;
  color: var(--white);
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.status-right { display: flex; gap: 6px; font-size: 13px; }

/* ============================================================
   TOP BAR
   ============================================================ */
.topbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 6px 20px 0;
  flex-shrink: 0;
  position: relative;
  z-index: 10;
}

.logo-wrap {
  display: flex;
  align-items: baseline;
  gap: 2px;
}

.logo-the {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  font-weight: 800;
  color: rgba(255,255,255,0.5);
  text-transform: uppercase;
  letter-spacing: 2px;
}

.logo-pulse {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 34px;
  letter-spacing: 2px;
  color: var(--white);
  line-height: 1;
}

.logo-pulse .accent { color: var(--geo); }

.topbar-right {
  display: flex;
  align-items: center;
  gap: 10px;
}

.live-chip {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 5px 10px;
  background: rgba(255,59,92,0.1);
  border: 1px solid rgba(255,59,92,0.3);
  border-radius: 20px;
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  color: var(--geo);
  letter-spacing: 1.5px;
  text-transform: uppercase;
}

.live-pulse {
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--geo);
  animation: lpulse 1.3s ease-in-out infinite;
}
@keyframes lpulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.3;transform:scale(0.6)} }

/* ============================================================
   CATEGORY TABS
   ============================================================ */
.cat-tabs {
  display: flex;
  gap: 6px;
  padding: 10px 20px 8px;
  overflow-x: auto;
  flex-shrink: 0;
  scrollbar-width: none;
  position: relative;
  z-index: 10;
}
.cat-tabs::-webkit-scrollbar { display: none; }

.cat-tab {
  display: flex;
  align-items: center;
  gap: 5px;
  padding: 6px 14px;
  border-radius: 20px;
  border: 1px solid var(--border);
  background: none;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 700;
  cursor: pointer;
  white-space: nowrap;
  transition: all 0.2s;
  flex-shrink: 0;
}

.cat-tab.active { border-color: transparent; color: var(--black); }
.cat-tab[data-cat="all"].active { background: var(--white); }
.cat-tab[data-cat="geo"].active { background: var(--geo); }
.cat-tab[data-cat="money"].active { background: var(--money); }
.cat-tab[data-cat="tech"].active { background: var(--tech); }
.cat-tab[data-cat="culture"].active { background: var(--culture); }

/* ============================================================
   MAIN CONTENT AREA — tabs
   ============================================================ */
.content-area {
  flex: 1;
  position: relative;
  overflow: hidden;
}

.view {
  position: absolute;
  inset: 0;
  opacity: 0;
  pointer-events: none;
  transform: translateY(12px);
  transition: opacity 0.3s, transform 0.3s;
}

.view.active {
  opacity: 1;
  pointer-events: all;
  transform: translateY(0);
}

/* ============================================================
   FEED VIEW
   ============================================================ */
.feed-wrap {
  width: 100%;
  height: 100%;
  position: relative;
  overflow: hidden;
}

/* Individual story card — full screen */
.story {
  position: absolute;
  inset: 0;
  display: flex;
  flex-direction: column;
  border-radius: 0;
  overflow: hidden;
  cursor: pointer;
  transition: transform var(--transition), opacity 0.3s;
  will-change: transform;
  user-select: none;
}

.story.state-active  { transform: translateY(0);     opacity: 1;   z-index: 2; pointer-events: all; }
.story.state-prev    { transform: translateY(-100%);  opacity: 0;   z-index: 1; pointer-events: none; }
.story.state-next    { transform: translateY(100%);   opacity: 0;   z-index: 1; pointer-events: none; }
.story.state-hidden  { transform: translateY(120%);   opacity: 0;   z-index: 0; pointer-events: none; }

.story.anim-exit-up  { transition: transform 0.36s ease-in, opacity 0.25s; transform: translateY(-110%) !important; opacity: 0 !important; }
.story.anim-exit-dn  { transition: transform 0.36s ease-in, opacity 0.25s; transform: translateY(110%)  !important; opacity: 0 !important; }
.story.anim-none     { transition: none !important; }

/* Story background */
.story-bg {
  position: absolute;
  inset: 0;
  z-index: 0;
}

.story-grain {
  position: absolute;
  inset: 0;
  z-index: 1;
  opacity: 0.025;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  background-size: 200px;
  pointer-events: none;
}

.story-overlay {
  position: absolute;
  inset: 0;
  z-index: 2;
  background: linear-gradient(
    to bottom,
    rgba(0,0,0,0.05) 0%,
    rgba(0,0,0,0.0) 30%,
    rgba(0,0,0,0.6) 65%,
    rgba(0,0,0,0.95) 100%
  );
}

/* Story content */
.story-body {
  position: relative;
  z-index: 3;
  display: flex;
  flex-direction: column;
  height: 100%;
  padding: 0;
}

.story-top {
  padding: 14px 16px 0;
}

.story-cat-pill {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 800;
  letter-spacing: 0.8px;
  text-transform: uppercase;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.15);
  background: rgba(0,0,0,0.3);
}

.story-spacer { flex: 1; }

/* Center visual */
.story-visual {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  flex: 1;
  padding: 20px;
  gap: 12px;
}

.story-emoji {
  font-size: 100px;
  line-height: 1;
  filter: drop-shadow(0 12px 40px rgba(0,0,0,0.6));
  animation: float 3.5s ease-in-out infinite;
  display: block;
}
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }

.story-stat {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 10px 20px;
  border-radius: 30px;
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 900;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1);
}

/* Story bottom */
.story-bottom {
  padding: 0 18px 16px;
}

.story-kicker {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  margin-bottom: 6px;
  opacity: 0.7;
}

.story-headline {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 30px;
  font-weight: 900;
  line-height: 1.1;
  letter-spacing: -0.3px;
  color: var(--white);
  margin-bottom: 12px;
  text-shadow: 0 2px 20px rgba(0,0,0,0.5);
}

.story-chips {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin-bottom: 14px;
}

.chip {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  padding: 6px 11px;
  border-radius: 20px;
  font-size: 12px;
  font-weight: 700;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  color: rgba(255,255,255,0.9);
  backdrop-filter: blur(20px);
}

/* Story footer */
.story-footer {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.prog-bar {
  display: flex;
  gap: 4px;
  align-items: center;
}

.prog-seg {
  height: 3px;
  border-radius: 3px;
  background: rgba(255,255,255,0.2);
  transition: all 0.3s;
}

.prog-seg.done { background: rgba(255,255,255,0.9); }
.prog-seg.active { background: rgba(255,255,255,0.9); animation: none; }

.story-actions {
  display: flex;
  gap: 8px;
}

.story-action-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  font-size: 16px;
  transition: transform 0.15s, background 0.15s;
  backdrop-filter: blur(20px);
}
.story-action-btn:active { transform: scale(0.85); }

/* Right sidebar */
.story-sidebar {
  position: absolute;
  right: 14px;
  bottom: 80px;
  z-index: 10;
  display: flex;
  flex-direction: column;
  gap: 16px;
}

.sidebar-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
}

.sidebar-btn {
  width: 46px; height: 46px;
  border-radius: 50%;
  background: rgba(255,255,255,0.1);
  backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.12);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
  cursor: pointer;
  transition: transform 0.15s, background 0.2s;
}
.sidebar-btn:active { transform: scale(0.88); }
.sidebar-btn.liked { background: rgba(255,59,92,0.25); border-color: rgba(255,59,92,0.4); }

.sidebar-count {
  font-size: 10px;
  font-weight: 800;
  color: rgba(255,255,255,0.6);
  font-family: 'DM Mono', monospace;
}

/* Swipe up hint */
.swipe-up-hint {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  z-index: 4;
  pointer-events: none;
}

.swipe-arrow {
  font-size: 16px;
  color: rgba(255,255,255,0.25);
  animation: bounce 1.8s ease-in-out infinite;
}
@keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.25} 50%{transform:translateY(-5px);opacity:0.6} }

.swipe-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.2);
  text-transform: uppercase;
}

/* ============================================================
   VERSUS VIEW
   ============================================================ */
.versus-wrap {
  height: 100%;
  display: flex;
  flex-direction: column;
  padding: 12px 16px 16px;
  gap: 12px;
  overflow-y: auto;
  scrollbar-width: none;
}
.versus-wrap::-webkit-scrollbar { display: none; }

.versus-header {
  text-align: center;
  padding: 4px 0;
}

.versus-title {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 3px;
  color: var(--white);
}

.versus-sub {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  margin-top: 2px;
}

/* Versus card */
.versus-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 20px;
  overflow: hidden;
  flex-shrink: 0;
}

.versus-card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 14px 10px;
  border-bottom: 1px solid var(--border);
}

.versus-topic {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

.versus-voters {
  font-size: 10px;
  font-weight: 700;
  color: var(--muted);
}

.versus-battle {
  display: grid;
  grid-template-columns: 1fr auto 1fr;
  gap: 0;
}

.versus-side {
  padding: 16px 14px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  cursor: pointer;
  transition: background 0.2s;
  position: relative;
  overflow: hidden;
}

.versus-side:hover { background: rgba(255,255,255,0.03); }

.versus-side.voted-winner { background: rgba(255,255,255,0.05); }
.versus-side.voted-loser  { background: rgba(0,0,0,0.2); opacity: 0.7; }

.versus-emoji-big { font-size: 44px; }

.versus-option-text {
  font-family: 'Barlow Condensed', sans-serif;
  font-size: 16px;
  font-weight: 800;
  text-align: center;
  line-height: 1.2;
  color: var(--white);
  letter-spacing: 0.2px;
}

.versus-pct {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 28px;
  letter-spacing: 1px;
  color: var(--white);
  display: none;
}

.versus-pct.show { display: block; }

.versus-bar-wrap {
  height: 4px;
  background: rgba(255,255,255,0.08);
  border-radius: 4px;
  width: 100%;
  overflow: hidden;
  display: none;
}
.versus-bar-wrap.show { display: block; }
.versus-bar { height: 100%; border-radius: 4px; transition: width 0.8s cubic-bezier(.22,.68,0,1.1); }

.versus-vs {
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 0 2px;
}

.vs-badge {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 16px;
  letter-spacing: 1px;
  color: var(--muted);
  background: var(--border);
  width: 30px; height: 30px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
}

/* Swipe arrows overlay on versus */
.versus-swipe-hint {
  position: absolute;
  bottom: 0; left: 0; right: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  pointer-events: none;
  font-size: 11px;
  color: rgba(255,255,255,0.25);
  padding: 8px;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 1px;
  font-family: 'DM Mono', monospace;
}

/* ============================================================
   STORY BACKGROUNDS - category themes
   ============================================================ */

/* GEO */
.bg-geo { background: radial-gradient(ellipse at 30% 20%, #3d0015 0%, #1a0008 40%, #000 100%); }
.pill-geo { color: var(--geo); }
.stat-geo { background: rgba(255,59,92,0.12); color: var(--geo); border-color: rgba(255,59,92,0.2); }
.kicker-geo { color: var(--geo); }
.bar-geo { background: var(--geo); }

/* MONEY */
.bg-money { background: radial-gradient(ellipse at 30% 20%, #003320 0%, #001a10 40%, #000 100%); }
.pill-money { color: var(--money); }
.stat-money { background: rgba(0,230,118,0.1); color: var(--money); border-color: rgba(0,230,118,0.2); }
.kicker-money { color: var(--money); }
.bar-money { background: var(--money); }

/* TECH */
.bg-tech { background: radial-gradient(ellipse at 30% 20%, #001a40 0%, #000d20 40%, #000 100%); }
.pill-tech { color: var(--tech); }
.stat-tech { background: rgba(79,140,255,0.1); color: var(--tech); border-color: rgba(79,140,255,0.2); }
.kicker-tech { color: var(--tech); }
.bar-tech { background: var(--tech); }

/* CULTURE */
.bg-culture { background: radial-gradient(ellipse at 30% 20%, #28003d 0%, #14001f 40%, #000 100%); }
.pill-culture { color: var(--culture); }
.stat-culture { background: rgba(200,80,255,0.1); color: var(--culture); border-color: rgba(200,80,255,0.2); }
.kicker-culture { color: var(--culture); }
.bar-culture { background: var(--culture); }

/* ============================================================
   LOADING STATE
   ============================================================ */
.loading-screen {
  position: absolute;
  inset: 0;
  background: var(--black);
  z-index: 200;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 20px;
  transition: opacity 0.5s, transform 0.5s;
}

.loading-screen.gone {
  opacity: 0;
  transform: scale(0.98);
  pointer-events: none;
}

.loading-logo {
  font-family: 'Bebas Neue', sans-serif;
  font-size: 52px;
  letter-spacing: 4px;
  color: var(--white);
}
.loading-logo span { color: var(--geo); }

.loading-bar-wrap {
  width: 160px;
  height: 3px;
  background: var(--border);
  border-radius: 3px;
  overflow: hidden;
}

.loading-bar {
  height: 100%;
  background: var(--geo);
  border-radius: 3px;
  width: 0%;
  transition: width 0.3s ease;
}

.loading-status {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 1.5px;
  text-transform: uppercase;
  color: var(--muted);
}

/* ============================================================
   TOAST
   ============================================================ */
.toast {
  position: absolute;
  top: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(-10px);
  background: rgba(255,255,255,0.95);
  color: var(--black);
  padding: 10px 20px;
  border-radius: 30px;
  font-size: 13px;
  font-weight: 800;
  white-space: nowrap;
  opacity: 0;
  transition: all 0.3s;
  z-index: 500;
  pointer-events: none;
  backdrop-filter: blur(20px);
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

/* ============================================================
   BOTTOM NAV
   ============================================================ */
.bottom-nav {
  display: flex;
  align-items: center;
  justify-content: space-around;
  padding: 10px 8px 28px;
  background: rgba(0,0,0,0.9);
  backdrop-filter: blur(30px);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 50;
}

.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  cursor: pointer;
  padding: 6px 18px;
  border-radius: 14px;
  transition: background 0.2s;
  border: none;
  background: none;
}

.nav-item.active { background: rgba(255,255,255,0.06); }

.nav-icon { font-size: 22px; line-height: 1; }

.nav-label {
  font-family: 'DM Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.8px;
  color: rgba(255,255,255,0.35);
  transition: color 0.2s;
}
.nav-item.active .nav-label { color: var(--white); }

/* Haptic flash */
.haptic {
  position: absolute; inset: 0;
  background: #fff;
  opacity: 0;
  pointer-events: none;
  z-index: 400;
  border-radius: 50px;
  transition: opacity 0.06s;
}
.haptic.pop { opacity: 0.05; }

/* ============================================================

  },
];

// ── APP STATE ─────────────────────────────────────────────────
const state = {
  stories: [],
  currentIdx: 0,
  activeView: 'feed',
  activeCat: 'all',
  versusVotes: {}, // { storyId: 'a' | 'b' }
  likedStories: new Set(),
  isLoading: true,
};

// ── LOADING SEQUENCE ──────────────────────────────────────────
const loadingSteps = [
  'Scanning 200+ sources...',
  'Filtering by relevance...',
  'Rewriting in Pulse voice...',
  'Building Versus battles...',
  'Ready.',
];

async function bootApp() {
  const bar = document.getElementById('loadingBar');
  const status = document.getElementById('loadingStatus');

  for (let i = 0; i < loadingSteps.length; i++) {
    status.textContent = loadingSteps[i];
    bar.style.width = ((i + 1) / loadingSteps.length * 100) + '%';
    await sleep(i === loadingSteps.length - 1 ? 300 : 600);
  }

  // Load live stories from backend, fall back to curated
  try {
    state.stories = await fetchLiveStories();
  } catch (e) {
    console.warn('Live fetch failed, using fallback:', e);
    state.stories = FALLBACK_STORIES;
  }

  renderFeed();
  renderVersus();

  // Hide loading screen
  document.getElementById('loadingScreen').classList.add('gone');
  state.isLoading = false;
}

// ── NEWS FETCHING (via backend) ──────────────────────────────
async function fetchLiveStories() {
  const res = await fetch(CONFIG.API_PULSE, {
    method: 'GET',
    headers: { 'Content-Type': 'application/json' },
    signal: AbortSignal.timeout(25000),
  });

  if (!res.ok) throw new Error(`Backend error: ${res.status}`);

  const data = await res.json();

  if (!data.stories || data.stories.length === 0) {
    return FALLBACK_STORIES;
  }

  return data.stories.map(s => ({
    cat: s.cat || 'geo',
    emoji: s.emoji || '📰',
    stat: s.stat || 'BREAKING NEWS',
    kicker: s.kicker || 'NEWS',
    headline: s.headline || '',
    chips: s.chips || [],
    versus: s.versus || null,
    wtf: s.score || 7,
  }));
}

// ── VERSUS VOTES (real Supabase via backend) ──────────────────
async function castVoteBackend(storyId, option) {
  try {
    const res = await fetch(CONFIG.API_VOTES, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ story_id: storyId, option }),
    });
    if (!res.ok) return null;
    return await res.json();
  } catch {
    return null;
  }
}

async function getVotesBackend(storyId) {
  try {
    const res = await fetch(`${CONFIG.API_VOTES}?story_id=${encodeURIComponent(storyId)}`);
    if (!res.ok) return null;
    return await res.json();
  } catch {
    return null;
  }
}

// ── RENDER FEED ───────────────────────────────────────────────
function renderFeed() {
  const wrap = document.getElementById('feedWrap');
  // Remove skeleton
  document.getElementById('story-skeleton')?.remove();

  const stories = filteredStories();

  stories.forEach((s, i) => {
    const el = createStoryEl(s, i);
    wrap.appendChild(el);
  });

  updateStoryStates();
}

function filteredStories() {
  if (state.activeCat === 'all') return state.stories;
  return state.stories.filter(s => s.cat === state.activeCat);
}

function createStoryEl(s, idx) {
  const div = document.createElement('div');
  div.className = 'story state-hidden';
  div.dataset.idx = idx;
  div.dataset.cat = s.cat;

  const liked = state.likedStories.has(idx);

  div.innerHTML = `
    <div class="story-bg bg-${s.cat}"></div>
    <div class="story-grain"></div>
    <div class="story-overlay"></div>
    <div class="story-body">
      <div class="story-top">
        <div class="story-cat-pill pill-${s.cat}">${catLabel(s.cat)}</div>
      </div>
      <div class="story-visual">
        <span class="story-emoji">${s.emoji}</span>
        <div class="story-stat stat-${s.cat}">${s.stat}</div>
      </div>
      <div class="story-bottom">
        <div class="story-kicker kicker-${s.cat}">${s.kicker}</div>
        <div class="story-headline">${s.headline}</div>
        <div class="story-chips">
          ${s.chips.map(c => `<div class="chip">${c}</div>`).join('')}
        </div>
        <div class="story-footer">
          <div class="prog-bar" id="prog-${idx}"></div>
          <div class="story-actions">
            <div class="story-action-btn" onclick="openShare(${idx})" title="Share">📤</div>
            <div class="story-action-btn ${liked ? 'liked' : ''}" id="like-${idx}" onclick="toggleLike(${idx})" title="Like">${liked ? '❤️' : '🤍'}</div>
          </div>
        </div>
      </div>
    </div>
    <div class="story-sidebar">
      <div class="sidebar-item" onclick="toggleLike(${idx})">
        <div class="sidebar-btn ${liked ? 'liked' : ''}" id="sb-like-${idx}">${liked ? '❤️' : '🤍'}</div>
        <div class="sidebar-count" id="sb-count-${idx}">${randomCount()}</div>
      </div>
      <div class="sidebar-item" onclick="openShare(${idx})">
        <div class="sidebar-btn">📤</div>
        <div class="sidebar-count">Share</div>
      </div>
      <div class="sidebar-item" onclick="goToVersus(${idx})">
        <div class="sidebar-btn">⚔️</div>
        <div class="sidebar-count">Versus</div>
      </div>
    </div>
    <div class="swipe-up-hint">
      <div class="swipe-arrow">↑</div>
      <div class="swipe-label">Next story</div>
    </div>
  `;

  renderProgBar(div.querySelector(`#prog-${idx}`), idx, filteredStories().length);
  return div;
}

function catLabel(cat) {
  return { geo: '🌍 Geopolitics', money: '💸 Money', tech: '🤖 Tech', culture: '🎭 Culture' }[cat] || cat;
}

function randomCount() {
  return (Math.floor(Math.random() * 40 + 5) * 100).toLocaleString();
}

function renderProgBar(el, current, total) {
  if (!el) return;
  el.innerHTML = '';
  const maxShow = Math.min(total, 8);
  for (let i = 0; i < maxShow; i++) {
    const seg = document.createElement('div');
    const w = i < maxShow ? Math.floor(120 / maxShow - 4) : 18;
    seg.className = 'prog-seg' + (i < current ? ' done' : i === current ? ' active' : '');
    seg.style.width = Math.max(w, 12) + 'px';
    el.appendChild(seg);
  }
}

function updateStoryStates() {
  const stories = document.querySelectorAll('#feedWrap .story');
  const cur = state.currentIdx;
  stories.forEach((s, i) => {
    s.classList.remove('state-active','state-prev','state-next','state-hidden');
    if (i === cur) s.classList.add('state-active');
    else if (i === cur - 1) s.classList.add('state-prev');
    else if (i === cur + 1) s.classList.add('state-next');
    else s.classList.add('state-hidden');
  });
}

// ── STORY NAVIGATION ──────────────────────────────────────────
let tStartY = 0;
let tDragging = false;

function ts(e) { tStartY = e.touches[0].clientY; tDragging = true; }
function tm(e) { if (tDragging) e.preventDefault(); }
function te(e) {
  if (!tDragging) return; tDragging = false;
  const diff = tStartY - e.changedTouches[0].clientY;
  if (diff > 45) nextStory();
  else if (diff < -45) prevStory();
}

document.getElementById('feedWrap').addEventListener('click', function(e) {
  if (e.target.closest('.story-sidebar') || e.target.closest('.story-action-btn') || e.target.closest('.share-overlay')) return;
  const rect = this.getBoundingClientRect();
  const y = e.clientY - rect.top;
  if (y > rect.height * 0.6) nextStory();
  else prevStory();
});

document.addEventListener('keydown', e => {
  if (state.activeView !== 'feed') return;
  if (e.key === 'ArrowUp' || e.key === 'ArrowRight') nextStory();
  if (e.key === 'ArrowDown' || e.key === 'ArrowLeft') prevStory();
});

function nextStory() {
  const stories = document.querySelectorAll('#feedWrap .story');
  const total = stories.length;
  if (total === 0) return;
  hapticFlash();
  if (state.currentIdx >= total - 1) {
    // loop
    const cur = stories[state.currentIdx];
    cur.classList.add('anim-exit-up');
    setTimeout(() => { cur.classList.remove('anim-exit-up'); state.currentIdx = 0; updateStoryStates(); }, 350);
    return;
  }
  const cur = stories[state.currentIdx];
  cur.classList.add('anim-exit-up');
  setTimeout(() => { cur.classList.remove('anim-exit-up'); state.currentIdx++; updateStoryStates(); }, 350);
}

function prevStory() {
  if (state.currentIdx === 0) return;
  hapticFlash();
  state.currentIdx--;
  updateStoryStates();
}

// ── VERSUS ────────────────────────────────────────────────────
function renderVersus() {
  const wrap = document.getElementById('versusWrap');
  // Remove old cards
  wrap.querySelectorAll('.versus-card').forEach(c => c.remove());

  state.stories.forEach((s, i) => {
    if (!s.versus) return;
    const voted = state.versusVotes[i];
    const card = createVersusCard(s, i, voted);
    wrap.appendChild(card);
  });
}

function createVersusCard(s, idx, voted) {
  const totalVotes = Math.floor(Math.random() * 40000 + 5000);
  const pctA = voted
    ? (state.versusVotes[idx] === 'a' ? Math.floor(Math.random() * 20 + 50) : Math.floor(Math.random() * 20 + 30))
    : 50;
  const pctB = 100 - pctA;

  const card = document.createElement('div');
  card.className = 'versus-card';
  card.id = `vc-${idx}`;
  card.innerHTML = `
    <div class="versus-card-header">
      <div class="versus-topic">${catLabel(s.cat)} · ${s.kicker}</div>
      <div class="versus-voters">${(totalVotes).toLocaleString()} voted</div>
    </div>
    <div style="padding:8px 14px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:800;line-height:1.2;color:rgba(255,255,255,0.7)">${s.headline}</div>
    <div class="versus-battle">
      <div class="versus-side ${voted === 'a' ? 'voted-winner' : voted === 'b' ? 'voted-loser' : ''}" onclick="castVote(${idx},'a')" id="vs-a-${idx}">
        <div class="versus-emoji-big">${s.versus.a.emoji}</div>
        <div class="versus-option-text">${s.versus.a.text}</div>
        <div class="versus-pct ${voted ? 'show' : ''}" id="pct-a-${idx}">${pctA}%</div>
        <div class="versus-bar-wrap ${voted ? 'show' : ''}">
          <div class="versus-bar bar-${s.cat}" id="bar-a-${idx}" style="width:${voted ? pctA : 0}%"></div>
        </div>
      </div>
      <div class="versus-vs"><div class="vs-badge">VS</div></div>
      <div class="versus-side ${voted === 'b' ? 'voted-winner' : voted === 'a' ? 'voted-loser' : ''}" onclick="castVote(${idx},'b')" id="vs-b-${idx}">
        <div class="versus-emoji-big">${s.versus.b.emoji}</div>
        <div class="versus-option-text">${s.versus.b.text}</div>
        <div class="versus-pct ${voted ? 'show' : ''}" id="pct-b-${idx}">${pctB}%</div>
        <div class="versus-bar-wrap ${voted ? 'show' : ''}">
          <div class="versus-bar bar-${s.cat}" id="bar-b-${idx}" style="width:${voted ? pctB : 0}%"></div>
        </div>
      </div>
    </div>
  `;
  return card;
}

async function castVote(idx, side) {
  if (state.versusVotes[idx]) return; // already voted
  hapticFlash();
  state.versusVotes[idx] = side;

  // Optimistic UI — show instant feedback with local estimate
  let pctA = side === 'a' ? Math.floor(Math.random() * 20 + 50) : Math.floor(Math.random() * 20 + 30);
  let pctB = 100 - pctA;

  showVersusResult(idx, side, pctA, pctB);
  showToast(`${side === 'a' ? '✅' : '✅'} Voted! Fetching real results...`);

  // Send to backend and get real counts
  const storyId = `story-${idx}-${(state.stories[idx]?.headline || '').slice(0,20)}`;
  const result = await castVoteBackend(storyId, side);

  if (result && result.total > 1) {
    pctA = result.pctA;
    pctB = result.pctB;
    showVersusResult(idx, side, pctA, pctB);
    showToast(`⚔️ ${result.total.toLocaleString()} votes — ${Math.max(pctA,pctB)}% agree with you`);
  }
}

function showVersusResult(idx, side, pctA, pctB) {
  ['a','b'].forEach(s => {
    const pct = s === 'a' ? pctA : pctB;
    const pctEl = document.getElementById(`pct-${s}-${idx}`);
    if (pctEl) { pctEl.classList.add('show'); pctEl.textContent = pct + '%'; }
    const bw = document.getElementById(`bar-${s}-${idx}`)?.parentElement;
    if (bw) bw.classList.add('show');
    setTimeout(() => {
      const b = document.getElementById(`bar-${s}-${idx}`);
      if (b) b.style.width = pct + '%';
    }, 50);
    const sideEl = document.getElementById(`vs-${s}-${idx}`);
    sideEl?.classList.remove('voted-winner','voted-loser');
    if (s === side) sideEl?.classList.add('voted-winner');
    else sideEl?.classList.add('voted-loser');
  });
}

// ── CATEGORY FILTER ───────────────────────────────────────────
document.getElementById('catTabs').addEventListener('click', e => {
  const tab = e.target.closest('.cat-tab');
  if (!tab) return;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  tab.classList.add('active');
  state.activeCat = tab.dataset.cat;
  state.currentIdx = 0;

  // Re-render feed with filter
  const wrap = document.getElementById('feedWrap');
  wrap.querySelectorAll('.story').forEach(s => s.remove());
  const filtered = filteredStories();
  filtered.forEach((s, i) => {
    const el = createStoryEl(s, i);
    wrap.appendChild(el);
  });
  updateStoryStates();
  hapticFlash();
});

// ── VIEW SWITCHING ────────────────────────────────────────────
function switchView(view, btn) {
  state.activeView = view;
  hapticFlash();

  document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(b => b.classList.remove('active'));

  if (view === 'feed') {
    document.getElementById('viewFeed').classList.add('active');
    document.getElementById('nav-feed').classList.add('active');
  } else if (view === 'versus') {
    document.getElementById('viewVersus').classList.add('active');
    document.getElementById('nav-versus').classList.add('active');
    renderVersus(); // refresh
  }
}

function goToVersus(idx) {
  switchView('versus', null);
  document.getElementById('nav-versus').classList.add('active');
  document.getElementById('nav-feed').classList.remove('active');
  // Scroll to relevant card
  setTimeout(() => {
    document.getElementById(`vc-${idx}`)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

// ── LIKE ──────────────────────────────────────────────────────
function toggleLike(idx) {
  hapticFlash();
  const liked = state.likedStories.has(idx);
  if (liked) { state.likedStories.delete(idx); }
  else { state.likedStories.add(idx); }

  const newLiked = !liked;
  const btnEl = document.getElementById(`like-${idx}`);
  const sbBtn = document.getElementById(`sb-like-${idx}`);
  if (btnEl) btnEl.textContent = newLiked ? '❤️' : '🤍';
  if (sbBtn) { sbBtn.textContent = newLiked ? '❤️' : '🤍'; sbBtn.classList.toggle('liked', newLiked); }

  if (newLiked) showToast('❤️ Saved to your feed');
}

// ── SHARE ─────────────────────────────────────────────────────
let shareIdx = null;

function openShare(idx) {
  shareIdx = idx;
  const s = filteredStories()[idx] || state.stories[idx];
  if (!s) return;
  document.getElementById('shareHeadline').textContent = s.headline;
  document.getElementById('shareChips').innerHTML = s.chips.map(c => `<div class="chip">${c}</div>`).join('');
  document.getElementById('shareOverlay').classList.add('show');
}

function closeShare(e) {
  if (e && e.target !== document.getElementById('shareOverlay')) return;
  document.getElementById('shareOverlay').classList.remove('show');
}

async function doShare() {
  const s = filteredStories()[shareIdx] || state.stories[shareIdx];
  if (!s) return;
  const text = `${s.headline}\n\n${s.chips.join(' · ')}\n\nvia The Pulse 🔴`;
  if (navigator.share) {
    try { await navigator.share({ title: 'The Pulse', text }); }
    catch (e) { /* dismissed */ }
  } else {
    navigator.clipboard?.writeText(text);
    showToast('📋 Copied to clipboard');
  }
  document.getElementById('shareOverlay').classList.remove('show');
}

// ── UI HELPERS ────────────────────────────────────────────────
function hapticFlash() {
  const h = document.getElementById('haptic');
  h.classList.add('pop');
  setTimeout(() => h.classList.remove('pop'), 80);
}

let toastTimeout;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => t.classList.remove('show'), 2200);
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── BOOT ──────────────────────────────────────────────────────
bootApp();
</script>
